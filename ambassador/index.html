<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="description" content="Join the Kami Ambassador Program. Help grow local communities, earn referral rewards, and get early access to new features. Apply or log in to the Ambassador Portal." />

  <link rel="stylesheet" href="../assets/ambassador/styles.css?v=20260617o" />
  <link rel="stylesheet" href="../assets/download-nav-button.css" />
  <link rel="stylesheet" href="../assets/ambassador/landing.css?v=20260616a" />
  <script src="../assets/supabase-browser-public.js"></script>
  <script>
    if ("scrollRestoration" in history) history.scrollRestoration = "manual";
  </script>
</head>
<body class="ambassador-is-public">
  <nav>
    <div class="nav-inner ambassador-nav-inner">
      <a href="/" aria-label="Kami home">
        <img class="wordmark-img" src="../assets/logo-wordmark.png" alt="Kami" />
      </a>
      <div class="ambassador-nav-right">
        <div class="ambassador-nav-links">
          <a class="nav-link ambassador-nav-home" href="/" hidden>Kami Home</a>
          <a class="nav-link ambassador-nav-marketing" href="#ambassador-why">Why Join</a>
          <a class="nav-link ambassador-nav-marketing" href="#ambassador-how">How It Works</a>
          <a class="nav-link ambassador-nav-marketing" href="#ambassador-apply">Apply</a>
          <a class="nav-link ambassador-nav-marketing" href="#ambassador-login">Ambassador Login</a>
        </div>
        <button type="button" class="btn secondary btn-sm ambassador-nav-logout" id="ambassador-nav-logout" hidden aria-hidden="true">Log out</button>
        <a href="/#download" class="btn nav-download">Download Kami</a>
      </div>
    </div>
  </nav>
  <script>
    (function () {
      var logout = document.getElementById("ambassador-nav-logout");
      if (logout) logout.hidden = true;
    })();
  </script>

  <main class="container" id="ambassador-main">
    <div id="ambassador-root" aria-live="polite"></div>
  </main>

  <footer id="ambassador-public-footer" class="site-footer">
    <div class="nav-container footer-columns">
      <div class="footer-brand">
        <a href="/" aria-label="Kami home">
          <img class="wordmark-img footer-wordmark" src="../assets/logo-wordmark.png" alt="Kami" />
        </a>
        <p>Real people. Real moments.</p>
      </div>
      <div class="footer-col">
        <h4>About</h4>
        <a href="/">Home</a>
        <a href="/how-it-works">How It Works</a>
        <a href="/#faq">FAQ</a>
        <a href="/store">Store</a>
      </div>
      <div class="footer-col">
        <h4>Company</h4>
        <a href="/privacy">Privacy Policy</a>
        <a href="/terms">Terms of Service</a>
        <a href="/ambassador">Ambassadors</a>
        <a href="/partner">Partners</a>
      </div>
      <div class="footer-col">
        <h4>Contact</h4>
        <a href="mailto:hello@kamisocial.com"><strong>hello@kamisocial.com</strong></a>
      </div>
      <div class="footer-col footer-col-download">
        <h4>Download</h4>
        <a class="btn nav-download" href="/#download">Download Kami</a>
      </div>
    </div>
    <div class="copyright">© 2026 Kami Social. All rights reserved.</div>
  </footer>

  <div id="amb-modal" class="amb-modal" hidden>
    <div class="amb-modal-backdrop" aria-hidden="true"></div>
    <div class="amb-modal-card" role="dialog" aria-modal="true" aria-labelledby="amb-modal-title">
      <button type="button" class="amb-modal-close" id="amb-modal-close" aria-label="Close">×</button>
      <h2 id="amb-modal-title"></h2>
      <div id="amb-modal-body"></div>
    </div>
  </div>

  <script type="module">
    import {
      renderPublicLandingHTML,
      scheduleAmbassadorLandingHash,
      wireAmbassadorLandingHashScroll,
    } from "../assets/ambassador/public-landing.js?v=20260615j";

    const likelyLoggedIn =
      typeof window.kamiHasLikelyStoredSession === "function" &&
      window.kamiHasLikelyStoredSession("ambassador");

    if (!likelyLoggedIn) {
      const root = document.getElementById("ambassador-root");
      if (root && !root.querySelector(".ambassador-land")) {
        root.innerHTML = renderPublicLandingHTML();
        wireAmbassadorLandingHashScroll();
        scheduleAmbassadorLandingHash();
      }
    }
  </script>
  <script>
    (function () {
      var root = document.getElementById("ambassador-root");
      if (!root || typeof window.kamiHasLikelyStoredSession !== "function") return;
      if (!window.kamiHasLikelyStoredSession("ambassador")) return;
      root.className = "amb-boot-loading";
      root.setAttribute("aria-busy", "true");
      root.innerHTML =
        '<section class="panel boot-panel ambassador-boot-panel">' +
        '<img class="boot-logo" src="../assets/k-mark-transparent.png" alt="" width="56" height="62" aria-hidden="true" />' +
        '<p class="boot-text" role="status">Loading ambassador portal…</p>' +
        '</section>';
    })();
  </script>
  <script type="module" src="../assets/ambassador/app.js?v=20260617o"></script>
</body>
</html>
